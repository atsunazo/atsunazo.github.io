<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"
    >
    <title>謎解き１</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
        }

        body {
            margin: 0;
            min-width: 0;
            min-height: 100dvh;
            overflow-x: hidden;
            overflow-y: auto;
            background: #f3f6fb;
            color: #222;
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Hiragino Sans",
                "Hiragino Kaku Gothic ProN",
                "Noto Sans JP",
                sans-serif;
        }

        #quiz-container {
            width: min(100%, 480px);
            min-height: 100dvh;
            margin: 0 auto;
            padding:
                max(20px, env(safe-area-inset-top))
                16px
                max(24px, env(safe-area-inset-bottom));
            background-color: #fff;
            text-align: center;
        }

        #start-screen,
        #quiz-screen,
        #finish-screen {
            width: 100%;
        }

        #title-image {
            display: block;
            width: min(100%, 380px);
            height: auto;
            margin: 12px auto 24px;
        }

        #timer {
            margin: 4px 0 16px;
            color: #444;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        #quiz-area {
            width: 100%;
        }

        #question-image {
            display: block;
            width: 100%;
            max-width: 346px;
            height: auto;
            max-height: 48dvh;
            margin: 0 auto 16px;
            object-fit: contain;
            border-radius: 8px;
        }

        input[type="text"] {
            display: block;
            width: 100%;
            min-height: 48px;
            margin: 12px auto;
            padding: 12px 14px;
            border: 1px solid #b8c1cc;
            border-radius: 8px;
            background: #fff;
            color: #222;
            font-size: 16px;
            line-height: 1.4;
        }

        input[type="text"]:focus {
            outline: 3px solid rgba(42, 116, 255, 0.28);
            border-color: #2a74ff;
        }

        input[type="text"]:disabled {
            background: #eef1f4;
            color: #555;
        }

        button {
            min-width: 112px;
            min-height: 48px;
            margin: 4px;
            padding: 10px 18px;
            border: 0;
            border-radius: 8px;
            background: #1769e0;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.98);
        }

        button:focus-visible {
            outline: 3px solid rgba(42, 116, 255, 0.4);
            outline-offset: 2px;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        #back-btn {
            background: #68717c;
        }

        .button-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 8px;
        }

        .button-row button {
            flex: 1;
            max-width: 180px;
            margin: 0;
        }

        #result-message {
            min-height: 1.5em;
            margin: 12px 0 4px;
            font-weight: 700;
        }

        .rank {
            margin-top: 12px;
            font-size: 28px;
            font-weight: 800;
        }

        .incorrect {
            color: #c62828;
        }

        @media (max-width: 360px) {
            #quiz-container {
                padding-right: 12px;
                padding-left: 12px;
            }

            button {
                min-width: 96px;
            }
        }
    </style>
</head>

<body>
    <main id="quiz-container">
        <section id="start-screen">
            <img id="title-image" src="./0.png" alt="謎解き１">

            <input
                type="text"
                id="name-input"
                placeholder="名前を入力してください"
                autocomplete="name"
            >

            <button id="start-btn" type="button">開始</button>
        </section>

        <section id="quiz-screen" style="display: none;">
            <div id="timer" aria-live="polite">残り時間: 10:00</div>

            <div id="quiz-area">
                <img id="question-image" src="" alt="問題画像">
            </div>

            <input
                type="text"
                id="answer-input"
                placeholder="回答を入力"
                autocomplete="off"
                enterkeyhint="done"
            >

            <div class="button-row">
                <button id="back-btn" type="button">戻る</button>
                <button id="submit-btn" type="button">送信</button>
            </div>

            <p id="result-message" aria-live="polite"></p>
        </section>

        <section id="finish-screen" style="display: none;">
            <div id="finish-result"></div>
            <button id="restart-btn" type="button">終了</button>
        </section>
    </main>

    <script>
        const TIME_LIMIT = 600;

        const questions = [
            { image: "./1.png", answer: ["きのこ", "キノコ"] },
            { image: "./2.png", answer: ["あいす", "アイス"] },
            { image: "./3.png", answer: ["だむ", "ダム"] },
            { image: "./4.png", answer: ["まえば", "マエバ"] },
            { image: "./5.png", answer: ["からす", "カラス"] },
            { image: "./6.png", answer: ["よもぎ", "ヨモギ"] },
            { image: "./7.png", answer: ["うに", "ウニ"] },
            { image: "./8.png", answer: ["しりとり", "シリトリ"] }
        ];

        let currentQuestion = 0;
        let timerInterval;
        let answers = [];
        let solvedQuestions = new Set();
        let playerName = "";
        let remainingTime = TIME_LIMIT;

        const startScreen = document.getElementById("start-screen");
        const quizScreen = document.getElementById("quiz-screen");
        const finishScreen = document.getElementById("finish-screen");

        const nameInput = document.getElementById("name-input");
        const startBtn = document.getElementById("start-btn");

        const questionImage = document.getElementById("question-image");
        const answerInput = document.getElementById("answer-input");
        const submitBtn = document.getElementById("submit-btn");
        const backBtn = document.getElementById("back-btn");

        const resultMessage = document.getElementById("result-message");
        const timerDisplay = document.getElementById("timer");

        const finishResult = document.getElementById("finish-result");
        const restartBtn = document.getElementById("restart-btn");

        startBtn.addEventListener("click", () => {
            playerName = nameInput.value.trim() || "ななし";

            startScreen.style.display = "none";
            quizScreen.style.display = "block";

            startQuiz();
        });

        nameInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                startBtn.click();
            }
        });

        answerInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !answerInput.disabled) {
                submitBtn.click();
            }
        });

        function startQuiz() {
            remainingTime = TIME_LIMIT;
            updateTimerDisplay();
            showQuestion(currentQuestion);

            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function showQuestion(index) {
            const question = questions[index];

            questionImage.src = question.image;
            questionImage.alt = `第${index + 1}問`;

            backBtn.disabled = index === 0;

            if (solvedQuestions.has(index)) {
                answerInput.value = answers[index];
                answerInput.disabled = true;
                submitBtn.disabled = true;

                resultMessage.textContent = "正解済み";
                resultMessage.className = "";
            } else {
                answerInput.value = "";
                answerInput.disabled = false;
                submitBtn.disabled = false;

                resultMessage.textContent = "";
                resultMessage.className = "";

                setTimeout(() => {
                    answerInput.focus();
                }, 100);
            }
        }

        function updateTimer() {
            remainingTime--;

            if (remainingTime <= 0) {
                remainingTime = 0;
                updateTimerDisplay();
                clearInterval(timerInterval);
                finishQuiz(true);
                return;
            }

            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(remainingTime / 60);
            const seconds = remainingTime % 60;

            timerDisplay.textContent =
                `残り時間: ${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;
        }

        submitBtn.addEventListener("click", () => {
            const userAnswer = answerInput.value.trim();

            if (questions[currentQuestion].answer.includes(userAnswer)) {
                answers[currentQuestion] = userAnswer;
                solvedQuestions.add(currentQuestion);

                currentQuestion++;

                if (currentQuestion < questions.length) {
                    showQuestion(currentQuestion);
                } else {
                    finishQuiz();
                }
            } else {
                resultMessage.textContent = "ちがうよ";
                resultMessage.className = "incorrect";
                answerInput.focus();
            }
        });

        backBtn.addEventListener("click", () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion(currentQuestion);
            }
        });

        function getRank(time) {
            const elapsedSeconds = TIME_LIMIT - time;

            if (elapsedSeconds <= TIME_LIMIT * 0.2) return "SS";
            if (elapsedSeconds <= TIME_LIMIT * 0.4) return "S";
            if (elapsedSeconds <= TIME_LIMIT * 0.6) return "A";
            if (elapsedSeconds <= TIME_LIMIT * 0.8) return "B";

            return "C";
        }

        function finishQuiz(isTimeUp = false) {
            clearInterval(timerInterval);

            const elapsedTime = TIME_LIMIT - remainingTime;
            const minutes = Math.floor(elapsedTime / 60);
            const seconds = elapsedTime % 60;

            const finalTime = isTimeUp
                ? "時間切れ"
                : `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;

            const rank = getRank(remainingTime);

            quizScreen.style.display = "none";
            finishScreen.style.display = "block";

            finishResult.innerHTML = `
                <p>名前: ${escapeHtml(playerName)}</p>
                <p>タイム: ${finalTime}</p>
                <p class="rank">ランク: ${rank}</p>
            `;
        }

        function resetQuiz() {
            clearInterval(timerInterval);

            currentQuestion = 0;
            answers = [];
            solvedQuestions.clear();
            remainingTime = TIME_LIMIT;
            playerName = "";

            nameInput.value = "";
            answerInput.value = "";
            resultMessage.textContent = "";

            finishScreen.style.display = "none";
            startScreen.style.display = "block";

            nameInput.focus();
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        restartBtn.addEventListener("click", resetQuiz);
    </script>
</body>
</html>
