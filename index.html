<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"
    >
    <title>謎解き１</title>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --secondary: #f1f5f9;
            --text: #1e293b;
            --muted: #64748b;
            --danger: #dc2626;
            --border: #dbe3ee;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            padding: 20px 16px;
            overflow-x: hidden;
            overflow-y: auto;
            color: var(--text);
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Hiragino Sans",
                "Hiragino Kaku Gothic ProN",
                "Noto Sans JP",
                "Yu Gothic",
                Meiryo,
                sans-serif;
            background:
                radial-gradient(circle at top left, #dbeafe 0, transparent 38%),
                linear-gradient(145deg, #f8fafc, #eef2ff);
        }

        #quiz-container {
            width: min(100%, 420px);
            margin: max(24px, 8dvh) auto 0;
            padding: 24px 18px;
            text-align: center;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            box-shadow: 0 16px 40px rgba(71, 85, 105, 0.16);
        }

        #title-image {
            display: block;
            width: min(100%, 340px);
            height: auto;
            margin: 0 auto 22px;
        }

        #timer {
            margin: 0 0 16px;
            padding: 10px 14px;
            color: var(--primary-dark);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.04em;
            background: #eef2ff;
            border-radius: 12px;
        }

        #quiz-area {
            display: flex;
            justify-content: center;
        }

        #question-image {
            display: block;
            width: 100%;
            max-width: 346px;
            height: auto;
            aspect-ratio: 346 / 244;
            margin: 0 auto 18px;
            object-fit: cover;
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(71, 85, 105, 0.12);
        }

        input[type="text"] {
            display: block;
            width: 100%;
            min-height: 52px;
            margin: 12px auto 16px;
            padding: 12px 14px;
            color: var(--text);
            font: inherit;
            font-size: 16px;
            line-height: 1.4;
            background: #ffffff;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]::placeholder {
            color: #94a3b8;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.14);
        }

        input[type="text"]:disabled {
            color: var(--muted);
            background: #f8fafc;
            cursor: not-allowed;
        }

        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 112px;
            min-height: 48px;
            margin: 4px;
            padding: 10px 18px;
            color: #ffffff;
            font: inherit;
            font-size: 16px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.04em;
            white-space: nowrap;
            cursor: pointer;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.24);
            transition:
                transform 0.15s,
                background-color 0.15s,
                box-shadow 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover {
            background: var(--primary-dark);
            box-shadow: 0 6px 14px rgba(79, 70, 229, 0.3);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 6px rgba(79, 70, 229, 0.2);
        }

        button:focus-visible {
            outline: 3px solid #93c5fd;
            outline-offset: 3px;
        }

        #back-btn {
            color: #475569;
            background: var(--secondary);
            box-shadow: none;
        }

        #back-btn:hover {
            background: #e2e8f0;
        }

        #submit-btn,
        #start-btn,
        #restart-btn {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
        }

        #result-message {
            min-height: 1.5em;
            margin: 14px 0 0;
            color: #15803d;
            font-size: 15px;
            font-weight: 700;
        }

        .incorrect {
            color: var(--danger) !important;
        }

        #finish-result {
            margin: 0;
            font-size: 16px;
            line-height: 1.8;
        }

        #finish-result p {
            margin: 8px 0;
        }

        .rank {
            margin-top: 18px !important;
            padding: 12px;
            color: var(--primary-dark);
            font-size: 22px !important;
            font-weight: 800;
            background: #eef2ff;
            border-radius: 14px;
        }

        @media (max-width: 380px) {
            body {
                padding: 14px 12px;
            }

            #quiz-container {
                margin-top: 18px;
                padding: 20px 14px;
                border-radius: 20px;
            }

            button {
                min-width: 104px;
            }
        }
    </style>
</head>

<body>
    <div id="quiz-container">
        <div id="start-screen">
            <img id="title-image" src="./0.png" alt="タイトル画像">
            <input
                type="text"
                id="name-input"
                placeholder="名前を入力してください"
            >
            <button id="start-btn">開始</button>
        </div>

        <div id="quiz-screen" style="display: none;">
            <div id="timer">残り時間: 10:00</div>

            <div id="quiz-area">
                <img id="question-image" src="" alt="問題画像">
            </div>

            <input
                type="text"
                id="answer-input"
                placeholder="回答を入力"
            >

            <button id="back-btn">戻る</button>
            <button id="submit-btn">送信</button>

            <p id="result-message"></p>
        </div>

        <div id="finish-screen" style="display: none;">
            <p id="finish-result"></p>
            <button id="restart-btn">終了</button>
        </div>
    </div>

    <script>
        // 制限時間を設定（秒単位）
        const TIME_LIMIT = 600; // 10分 = 600秒

        window.addEventListener('resize', function() {
            if (document.activeElement.tagName === 'INPUT') {
                window.setTimeout(function() {
                    document.activeElement.scrollIntoView();
                }, 0);
            }
        });

        const questions = [
            { image: './1.png', answer: ['きのこ', 'キノコ'] },
            { image: './2.png', answer: ['あいす', 'アイス'] },
            { image: './3.png', answer: ['だむ', 'ダム'] },
            { image: './4.png', answer: ['まえば', 'マエバ'] },
            { image: './5.png', answer: ['からす', 'カラス'] },
            { image: './6.png', answer: ['よもぎ', 'ヨモギ'] },
            { image: './7.png', answer: ['うに', 'ウニ'] },
            { image: './8.png', answer: ['しりとり', 'シリトリ'] },
        ];

        let currentQuestion = 0;
        let startTime;
        let timerInterval;
        let answers = [];
        let solvedQuestions = new Set();
        let playerName = '';
        let remainingTime = TIME_LIMIT;

        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const finishScreen = document.getElementById('finish-screen');
        const nameInput = document.getElementById('name-input');
        const startBtn = document.getElementById('start-btn');
        const quizArea = document.getElementById('quiz-area');
        const questionImage = document.getElementById('question-image');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const backBtn = document.getElementById('back-btn');
        const resultMessage = document.getElementById('result-message');
        const timerDisplay = document.getElementById('timer');
        const finishResult = document.getElementById('finish-result');
        const restartBtn = document.getElementById('restart-btn');

        startBtn.addEventListener('click', () => {
            playerName = nameInput.value.trim();

            if (!playerName) {
                playerName = 'ななし';
            }

            startScreen.style.display = 'none';
            quizScreen.style.display = 'block';

            startQuiz();
        });

        function startQuiz() {
            startTime = new Date().getTime();
            timerInterval = setInterval(updateTimer, 1000);

            showQuestion(currentQuestion);
        }

        function showQuestion(index) {
            const question = questions[index];

            questionImage.src = question.image;

            if (solvedQuestions.has(index)) {
                answerInput.value = answers[index];
                answerInput.disabled = true;
                resultMessage.textContent = '正解済み';
                resultMessage.className = '';
            } else {
                answerInput.value = '';
                answerInput.disabled = false;
                resultMessage.textContent = '';
                resultMessage.className = '';
            }
        }

        function updateTimer() {
            remainingTime--;

            if (remainingTime <= 0) {
                clearInterval(timerInterval);
                finishQuiz(true);
            } else {
                const minutes = Math.floor(remainingTime / 60);
                const seconds = remainingTime % 60;

                timerDisplay.textContent =
                    `残り時間: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }

        submitBtn.addEventListener('click', () => {
            const userAnswer = answerInput.value.trim();

            if (questions[currentQuestion].answer.includes(userAnswer)) {
                answers[currentQuestion] = userAnswer;
                solvedQuestions.add(currentQuestion);
                currentQuestion++;

                if (currentQuestion < questions.length) {
                    showQuestion(currentQuestion);
                } else {
                    finishQuiz();
                }
            } else {
                resultMessage.textContent = 'ちがうよ';
                resultMessage.className = 'incorrect';
            }
        });

        backBtn.addEventListener('click', () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion(currentQuestion);
            }
        });

        function getRank(time) {
            const elapsedSeconds = TIME_LIMIT - time;

            if (elapsedSeconds <= TIME_LIMIT * 0.2) return 'SS';
            if (elapsedSeconds <= TIME_LIMIT * 0.4) return 'S';
            if (elapsedSeconds <= TIME_LIMIT * 0.6) return 'A';
            if (elapsedSeconds <= TIME_LIMIT * 0.8) return 'B';

            return 'C';
        }

        function finishQuiz(isTimeUp = false) {
            clearInterval(timerInterval);

            const elapsedTime = TIME_LIMIT - remainingTime;
            const minutes = Math.floor(elapsedTime / 60);
            const seconds = elapsedTime % 60;

            const finalTime = isTimeUp
                ? '時間切れ'
                : `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            const rank = getRank(remainingTime);

            quizScreen.style.display = 'none';
            finishScreen.style.display = 'block';

            finishResult.innerHTML = `
                <p>名前: ${playerName}</p>
                <p>タイム: ${finalTime}</p>
                <p class="rank">ランク: ${rank}</p>
            `;
        }

        restartBtn.addEventListener('click', resetQuiz);

        function resetQuiz() {
            currentQuestion = 0;
            answers = [];
            solvedQuestions.clear();
            remainingTime = TIME_LIMIT;

            finishScreen.style.display = 'none';
            startScreen.style.display = 'block';
        }
    </script>
</body>
</html>
